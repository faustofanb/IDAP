  # ============================================
  # 采购管理 API
  # ============================================
  /purchase/orders:
    get:
      tags:
        - 采购管理
      summary: 查询采购订单列表
      operationId: listPurchaseOrders
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - name: orderNo
          in: query
          schema:
            type: string
        - name: supplierId
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PENDING, APPROVED, IN_TRANSIT, COMPLETED, CANCELLED]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"

    post:
      tags:
        - 采购管理
      summary: 创建采购订单
      operationId: createPurchaseOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderCreateRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PurchaseOrderVO"

  /purchase/orders/{id}:
    get:
      tags:
        - 采购管理
      summary: 获取采购订单详情
      operationId: getPurchaseOrder
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PurchaseOrderVO"

    delete:
      tags:
        - 采购管理
      summary: 删除采购订单
      description: 仅草稿状态可删除
      operationId: deletePurchaseOrder
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /purchase/orders/{id}/submit:
    post:
      tags:
        - 采购管理
      summary: 提交采购订单审核
      operationId: submitPurchaseOrder
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /purchase/orders/{id}/approve:
    post:
      tags:
        - 采购管理
      summary: 审核通过采购订单
      operationId: approvePurchaseOrder
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remark:
                  type: string
      responses:
        "200":
          description: 审核通过
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /purchase/orders/{id}/reject:
    post:
      tags:
        - 采购管理
      summary: 驳回采购订单
      operationId: rejectPurchaseOrder
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  description: 驳回原因
      responses:
        "200":
          description: 驳回成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
